name: Sync skills

on:
  schedule:
    - cron: "0 6 * * *" # daily, 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - name: Re-vendor skills from upstream main + recompile defaults
        run: |
          node scripts/sync-skills.mjs
          node scripts/compile-skills.mjs
      - name: Open or update sync PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/sync-skills
          add-paths: |
            vendor/skills/
            src/scrum/frontend-skill-defaults.generated.ts
          commit-message: "chore(skills): sync vendored skills from upstream main"
          title: "chore(skills): sync from claude_development_skills"
          body: |
            Automated sync of the vendored `vendor/skills/` tree from the plugin repo's `main`,
            plus the regenerated `src/scrum/frontend-skill-defaults.generated.ts` that seeds the
            project DB. Source commit is recorded in `vendor/skills/.source.json`. Review the diff before merging.
