name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build

  validate-counts:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Validate agent count
        run: |
          AGENT_COUNT=$(grep -A 100 "export const AGENT_DEFAULTS" src/scrum/defaults.ts | grep -E "^\s+role:" | wc -l)
          if [ "$AGENT_COUNT" -ne 9 ]; then
            echo "Error: Expected 9 agents, found $AGENT_COUNT"
            exit 1
          fi
          echo "Agent count validation passed: $AGENT_COUNT agents"
      - name: Validate skill count
        run: |
          SKILL_COUNT=$(grep -A 100 "export const SKILL_DEFAULTS" src/scrum/defaults.ts | grep -E "^\s+name:" | wc -l)
          if [ "$SKILL_COUNT" -ne 5 ]; then
            echo "Error: Expected 5 skills, found $SKILL_COUNT"
            exit 1
          fi
          echo "Skill count validation passed: $SKILL_COUNT skills"
      - name: Validate vendored skills
        run: |
          if [ ! -d vendor/skills ]; then
            echo "Error: vendored vendor/skills/ directory is missing"
            exit 1
          fi
          MANIFEST_COUNT=$(node -p "require('./vendor/skills/.source.json').skillCount")
          ACTUAL_COUNT=$(find vendor/skills -name SKILL.md | wc -l | tr -d ' ')
          if [ "$MANIFEST_COUNT" -ne "$ACTUAL_COUNT" ]; then
            echo "Error: vendor/skills/.source.json skillCount=$MANIFEST_COUNT but found $ACTUAL_COUNT SKILL.md files"
            exit 1
          fi
          echo "Vendored skills validation passed: $ACTUAL_COUNT skills"
